<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Services - Hlegal</title>
  </head>
  <body>
    <header class="header header--transparent">
      <div class="container header__container">
        <div class="header__logo-group">
          <a href="index.html" class="logo">
            <img src="/src/assets/logo-white.svg" alt="Hlegal Law Company" />
          </a>
          <img src="/src/assets/slash.svg" alt="/" class="header__slash" />
          <span class="header__page-name">services</span>
        </div>

        <div class="header__content">
          <div class="header__top">
            <div class="header__langs">
              <a href="#" class="lang">УК</a>
              <a href="#" class="lang">РУ</a>
              <a href="#" class="lang active">EN</a>
            </div>
            <span class="dot"></span>
            <address class="address">
              <a
                href="https://maps.app.goo.gl/UYKts7rFspb2g1nC8"
                target="_blank"
                rel="noopener noreferrer"
              >
                Kyiv, Mechnikova str, 14/1
              </a>
            </address>
            <span class="dot"></span>
            <a href="tel:0800211927" class="phone">0800 211 927</a>
            <span class="dot"></span>
            <a href="#" class="social-link">
              <img src="/src/assets/facebook.svg" alt="Facebook" />
            </a>
          </div>

          <nav class="nav" id="menu">
            <div class="nav__overlay" id="menu-overlay"></div>

            <div class="nav__inner">
              <button
                class="nav__close"
                id="menu-close"
                aria-label="Close menu"
              >
                <img src="/src/assets/Close.svg" alt="Close" />
              </button>

              <ul class="nav__list">
                <li class="nav__item">
                  <a href="about.html" class="nav__link">about us</a>
                </li>
                <li class="nav__item active">
                  <a href="services.html" class="nav__link">services</a>
                </li>
                <li class="nav__item">
                  <a href="#" class="nav__link">team</a>
                </li>
                <li class="nav__item">
                  <a href="#" class="nav__link">publications</a>
                </li>
                <li class="nav__item">
                  <a href="#" class="nav__link">contact</a>
                </li>
              </ul>
            </div>
          </nav>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <img src="/src/assets/Hamburger.svg" alt="Menu" />
        </button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero__container"></div>
      </section>

      <div class="hero-stripes">
        <div class="hero-stripes__dark"></div>
        <div class="hero-stripes__light"></div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>

</html>
